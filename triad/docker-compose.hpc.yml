version: '3.9'
networks:
  triad-core:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.1.0/24
    driver_opts:
      com.docker.network.bridge.name: br-triad-core
      com.docker.network.driver.mtu: '1450'
  triad-data:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.2.0/24
    driver_opts:
      com.docker.network.bridge.name: br-triad-data
      com.docker.network.driver.mtu: '1450'
  triad-worker:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.3.0/24
    driver_opts:
      com.docker.network.bridge.name: br-triad-worker
      com.docker.network.driver.mtu: '1450'
  triad-render:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.4.0/24
    driver_opts:
      com.docker.network.bridge.name: br-triad-render
      com.docker.network.driver.mtu: '1450'
volumes:
  qdrant-storage:
    driver: local
  openclaw-state:
    driver: local
  hermes-memory:
    driver: local
  registry-data:
    driver: local
  triad-memory:
    driver: local
  clawpod-shared:
    driver: local
services:
  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
      args:
      - NODE_ENV=production
    image: triad/openclaw:hpc-latest
    container_name: triad-openclaw
    cpuset: 0-7,24-31
    cap_add:
    - NET_ADMIN
    - SYS_ADMIN
    cap_drop:
    - ALL
    security_opt:
    - seccomp:./openclaw/seccomp-profile.json
    - no-new-privileges:true
    environment:
      ACP_BIND_ADDR: 0.0.0.0:17001
      ACP_WORKERS: '8'
      WS_BIND_ADDR: 0.0.0.0:17002
      WS_MAX_CONNECTIONS: '4096'
      WS_HEARTBEAT_INTERVAL_SEC: '30'
      DOCKER_SOCK_PATH: /var/run/docker.sock
      CLAWPOD_NETWORK: triad-worker
      CLAWPOD_IMAGE_PREFIX: triad/clawpod
      HERMES_AGENT_URL: http://hermes:18000
      HERMES_ACP_ENDPOINT: tcp://hermes:17001
      MCP_REGISTRY_URL: http://registry:18500
      MODEL_API_URL_PRIMARY: http://192.168.0.128:40080/v1
      MODEL_API_URL_SECONDARY: ''
      MODEL_API_URL_FALLBACK: ''
      MODEL_ROUTING_STRATEGY: local-priority
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: ''
    ports:
    - 17001:17001
    - 17002:17002
    - 18080:18080
    volumes:
    - openclaw-state:/app/state
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - clawpod-shared:/shared:ro
    networks:
    - triad-core
    healthcheck:
      test:
      - CMD
      - wget
      - -qO-
      - http://localhost:18080/health
      interval: 30s
      start_period: 10s
    depends_on:
    - registry
    - qdrant
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
      args:
      - PYTHON_VERSION=3.11
      - INSTALL_DEV=false
    image: triad/hermes:hpc-latest
    container_name: triad-hermes
    restart: unless-stopped
    cpuset: 8-11,32-35,12-19,36-43
    deploy:
      resources:
        limits:
          memory: 24G
    environment:
      COMFYUI_HOST: host.docker.internal
      COMFYUI_PORT: '18188'
      PYTORCH_CUDA_ALLOC_CONF: max_split_size_mb:512,expandable_segments:True
      HERMES_VRAM_LIMIT_MB: '2048'
      HERMES_VRAM_RESIDENT_MB: '1536'
      HERMES_VRAM_OVERHEAD_MB: '512'
      ACP_LISTEN_HOST: 0.0.0.0
      ACP_LISTEN_PORT: '17001'
      ACP_WORKERS: '4'
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: '18080'
      MCP_REGISTRY_URL: http://registry:18500
      EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
      EMBEDDING_DEVICE: cuda
      EMBEDDING_BATCH_SIZE: '32'
      EMBEDDING_MAX_LENGTH: '512'
      EMBEDDING_API_PORT: '19000'
      EMBEDDING_API_BIND: 0.0.0.0
      QDRANT_HOST: qdrant
      QDRANT_PORT: '16333'
      QDRANT_COLLECTION_NAME: hermes-memory
      QDRANT_VECTOR_SIZE: '1024'
      LLM_API_URL: http://192.168.0.128:40080/v1/chat/completions
      LLM_API_BASE: http://192.168.0.128:40080
      LLM_MODEL_NAME: qwen-14b-chat.Q4_K_M.gguf
      FALLBACK_CLOUD_API_URL: ''
      INFERENCE_STRATEGY: adaptive
      INFERENCE_LOCAL_VRAM_THRESHOLD_MB: '4096'
      PYTHONUNBUFFERED: '1'
      OMP_NUM_THREADS: '12'
      MKL_NUM_THREADS: '12'
      OPENBLAS_NUM_THREADS: '12'
      NUMEXPR_NUM_THREADS: '12'
      OMP_PLACES: cores
      OMP_PROC_BIND: spread
      LOG_LEVEL: INFO
      PYTHONDONTWRITEBYTECODE: '1'
    ports:
    - 18000:18000
    - 19000:19000
    volumes:
    - hermes-memory:/app/memory
    networks:
    - triad-core
    - triad-data
    - triad-worker
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:18001/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
    - qdrant
    - registry
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: triad-qdrant
    restart: unless-stopped
    cpuset: 20-21,44-45
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    environment:
      QDRANT__SERVICE__HTTP_PORT: '16333'
      QDRANT__SERVICE__GRPC_PORT: '16334'
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/snapshots
      QDRANT__STORAGE__WAL_CAPACITY_MB: '64'
      QDRANT__STORAGE__MAX_SEGMENT_NUMBER: '6'
    volumes:
    - qdrant-storage:/qdrant/storage
    ports:
    - 16333:16333
    - 16334:16334
    networks:
    - triad-data
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:16333/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    image: triad/registry:hpc-latest
    container_name: triad-registry
    restart: unless-stopped
    cpuset: 22-23,46-47
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    environment:
      REGISTRY_BIND: 0.0.0.0:18500
      REGISTRY_HEARTBEAT_SEC: '30'
      REGISTRY_TTL_SEC: '300'
      MCP_PROTOCOL_VERSION: '2024-11-05'
    ports:
    - 18500:18500
    volumes:
    - registry-data:/data
    networks:
    - triad-core
    healthcheck:
      test:
      - CMD
      - wget
      - -qO-
      - http://localhost:18500/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
  llama-server:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
          devices:
          - driver: nvidia
            count: 1
            capabilities:
            - gpu
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: '0'
      CUDA_VISIBLE_DEVICES: '0'
    networks:
    - triad-worker
    healthcheck:
      timeout: 5s
      retries: 3
  clawpod-small:
    image: triad/clawpod:base
    build:
      context: ./clawpod
      dockerfile: Dockerfile.base
    container_name: triad-clawpod-small
    restart: 'no'
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          memory: 512M
    read_only: true
    tmpfs:
    - /tmp:noexec,nosuid,size=128M
    - /var/tmp:noexec,nosuid,size=64M
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETGID
    - SETUID
    security_opt:
    - no-new-privileges:true
    environment:
      CLAWPOD_SIZE: small
      CLAWPOD_CPU_LIMIT: '1'
      CLAWPOD_MEM_LIMIT: 2G
      CLAWPOD_GPU_ENABLED: 'false'
      CLAWPOD_TIMEOUT_SEC: '300'
      COMFYUI_HOST: host.docker.internal
      COMFYUI_PORT: '18188'
      TASK_BROKER_URL: http://openclaw:17001
      EMBEDDING_API_URL: http://hermes:19000
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - clawpod-shared:/shared:ro
    - type: tmpfs
      target: /workspace
      tmpfs:
        size: 1G
    networks:
    - triad-worker
    profiles:
    - clawpod
    - hpc-full
  clawpod-medium:
    image: triad/clawpod:base
    container_name: triad-clawpod-medium
    restart: 'no'
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 1G
          devices:
          - driver: nvidia
            count: 1
            capabilities:
            - gpu
    runtime: nvidia
    read_only: true
    tmpfs:
    - /tmp:noexec,nosuid,size=256M
    - /var/tmp:noexec,nosuid,size=128M
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETGID
    - SETUID
    security_opt:
    - no-new-privileges:true
    environment:
      CLAWPOD_SIZE: medium
      CLAWPOD_CPU_LIMIT: '2'
      CLAWPOD_MEM_LIMIT: 4G
      CLAWPOD_GPU_ENABLED: 'true'
      CLAWPOD_GPU_VRAM_MB: '512'
      CLAWPOD_TIMEOUT_SEC: '600'
      COMFYUI_HOST: host.docker.internal
      COMFYUI_PORT: '18188'
      CUDA_VISIBLE_DEVICES: '0'
      NVIDIA_VISIBLE_DEVICES: '0'
      TASK_BROKER_URL: http://openclaw:17001
      EMBEDDING_API_URL: http://hermes:19000
      LOCAL_LLM_URL: http://192.168.0.128:40080/v1/chat/completions
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - clawpod-shared:/shared:ro
    - type: tmpfs
      target: /workspace
      tmpfs:
        size: 2G
    networks:
    - triad-worker
    profiles:
    - clawpod
    - hpc-full
  clawpod-large:
    image: triad/clawpod:gpu
    build:
      context: ./clawpod
      dockerfile: Dockerfile.gpu
    container_name: triad-clawpod-large
    restart: 'no'
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          memory: 4G
          devices:
          - driver: nvidia
            count: 1
            capabilities:
            - gpu
    runtime: nvidia
    read_only: false
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - SETGID
    - SETUID
    security_opt:
    - no-new-privileges:true
    environment:
      CLAWPOD_SIZE: large
      CLAWPOD_CPU_LIMIT: '8'
      CLAWPOD_MEM_LIMIT: 16G
      CLAWPOD_GPU_ENABLED: 'true'
      CLAWPOD_GPU_VRAM_MB: '4096'
      CLAWPOD_TIMEOUT_SEC: '1800'
      COMFYUI_HOST: host.docker.internal
      COMFYUI_PORT: '18188'
      CUDA_VISIBLE_DEVICES: '0'
      NVIDIA_VISIBLE_DEVICES: '0'
      LOCAL_LLM_URL: http://192.168.0.128:40080/v1/chat/completions
      LOCAL_LLM_BASE: http://192.168.0.128:40080
      OMP_NUM_THREADS: '8'
      MKL_NUM_THREADS: '8'
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - clawpod-shared:/shared:ro
    - type: tmpfs
      target: /workspace
      tmpfs:
        size: 8G
    networks:
    - triad-worker
    - triad-render
    profiles:
    - clawpod
    - hpc-full
  textgen-webui:
    image: ghcr.io/oobabooga/text-generation-webui:latest
    container_name: triad-textgen-webui
    restart: 'no'
    cpuset: 12-19,36-43
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G
          devices:
          - driver: nvidia
            count: 1
            capabilities:
            - gpu
    runtime: nvidia
    environment:
      CUDA_VISIBLE_DEVICES: '0'
      NVIDIA_VISIBLE_DEVICES: '0'
      CLI_ARGS: --listen --port 7860 --api --api-port 5000 --loader transformers --model-dir /models --max_seq_len 4096
    ports:
    - 7860:7860
    - 5000:5000
    volumes:
    - type: bind
      source: ~/.triad/models
      target: /models
      read_only: true
    networks:
    - triad-worker
    profiles:
    - debug
